<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trần Tiến iCloud</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(to bottom right, #4facfe, #00f2fe);
            color: #fff;
            text-align: center;
        }
        .container {
            background: rgba(0,0,0,0.3);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.3);
        }
        h1 {
            font-size: 36px;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }
        p {
            font-size: 18px;
            margin-bottom: 40px;
        }
        .download-btn {
            display: inline-block;
            padding: 18px 40px;
            font-size: 22px;
            background: #ff7e5f;
            color: #fff;
            border: none;
            border-radius: 12px;
            text-decoration: none;
            font-weight: bold;
            box-shadow: 0 6px 15px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
        }
        .download-btn:hover {
            background: #feb47b;
            transform: scale(1.05);
        }
        footer {
            margin-top: 30px;
            font-size: 14px;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Trần Tiến iCloud</h1>
        <p>Nhấp vào nút bên dưới để tải cấu hình iCloud trực tiếp về thiết bị của bạn.</p>
        <!-- Thay link bên dưới bằng link file mobileconfig thật của bạn -->
        <a class="download-btn" href="https://ahdaden25552-cloud.github.io/TranTien-iCloud/TranTien_iCloud.mobileconfig" download>
            Tải Cấu Hình
        </a>
        <footer>
            &copy; 2026 Trần Tiến iCloud
        </footer>
    </div>
</body>
</html>
